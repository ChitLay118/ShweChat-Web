<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ShweChat</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --primary-color: #2481cc;
      --primary-dark: #1d71b3;
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-main: #1c2434;
      --text-muted: #7e8b9b;
      --border-color: #e4e8ec;
      --bubble-sent: #e1f3fc;
      --bubble-received: #ffffff;
      --online-color: #4caf50;
      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Padauk', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
      height: 100%; width: 100%; overflow: hidden; 
      background-color: var(--bg-color);
    }

    /* flex layout သုံးပြီး အောက်ခြေမှာ Menu ကို အသေသတ်မှတ်မယ် */
    #app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    #screen-viewport {
      flex: 1; /* ကျန်တဲ့နေရာအကုန်ယူမယ် */
      position: relative;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: none; flex-direction: column;
      background-color: var(--bg-color);
    }
    .screen.active { display: flex; }

    /* Header */
    .app-header {
      background-color: var(--primary-color);
      color: white;
      padding: calc(14px + var(--safe-area-top)) 16px 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    /* Bottom Navigation - WebView မှာ အောက်ဆုံးကပ်နေစေရန် */
    .bottom-nav {
      height: calc(60px + var(--safe-area-bottom));
      background-color: #ffffff;
      border-top: 1px solid var(--border-color);
      display: flex; justify-content: space-around; align-items: center;
      padding-bottom: var(--safe-area-bottom);
      box-shadow: 0 -3px 12px rgba(0,0,0,0.05);
      flex-shrink: 0; /* ကျုံ့မသွားစေရန် */
    }

    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text-muted); cursor: pointer; width: 33.33%; height: 100%; gap: 3px;
    }
    .nav-item.active { color: var(--primary-color); }
    .nav-item i { font-size: 18px; }
    .nav-item span { font-size: 11px; font-weight: 500; }

    /* Content Lists */
    .main-screen-content { flex: 1; overflow-y: auto; }
    .list-item { 
        display: flex; align-items: center; padding: 14px 16px; 
        background: white; border-bottom: 1px solid #f5f6f8; 
    }
    .avatar { 
        width: 46px; height: 46px; border-radius: 50%; background: var(--primary-color); 
        color: white; display: flex; align-items: center; justify-content: center; 
        font-weight: bold; margin-right: 14px; flex-shrink: 0;
    }

    /* Chat Room */
    #chat-room-screen { z-index: 1000; background-color: #e5ddd5; }
    .chat-messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .message-bubble { max-width: 75%; padding: 8px 12px; border-radius: 16px; font-size: 14px; position: relative; }
    .sent { align-self: flex-end; background: var(--bubble-sent); border-top-right-radius: 2px; }
    .received { align-self: flex-start; background: var(--bubble-received); border-top-left-radius: 2px; }

    .chat-input-bar { 
        background: white; padding: 8px 12px calc(8px + var(--safe-area-bottom)) 12px; 
        display: flex; align-items: center; gap: 8px; 
    }
    .chat-input { flex: 1; border: 1px solid var(--border-color); border-radius: 20px; padding: 10px 16px; outline: none; }

    /* Auth Screen */
    #auth-screen { 
        z-index: 2000; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
        justify-content: center; align-items: center; 
    }
    .auth-card { background: white; width: 90%; max-width: 360px; border-radius: 24px; padding: 30px 24px; }
    .auth-btn { width: 100%; padding: 14px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; }

    /* Modals & Toasts */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 3000; }
    .modal-overlay.active { display: flex; }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 4000; display: none; }
  </style>
</head>
<body>

  <div id="app-container">

    <!-- Screen Viewport -->
    <div id="screen-viewport">
        
      <!-- 1. AUTH SCREEN -->
      <div id="auth-screen" class="screen active">
        <div class="auth-card">
          <div style="text-align:center; margin-bottom:20px;">
            <i class="fa-solid fa-comments" style="font-size:40px; color:#2481cc;"></i>
            <h2 id="auth-title">ShweChat</h2>
          </div>
          <input type="text" id="auth-name" placeholder="နာမည် (Register အတွက်)" style="display:none; width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
          <input type="email" id="auth-email" placeholder="ဂျီမေးလ်" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
          <input type="password" id="auth-password" placeholder="စကားဝှက်" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd;">
          <button class="auth-btn" id="auth-submit-btn">အကောင့်ဝင်ရန်</button>
          <div id="auth-toggle-btn" style="text-align:center; margin-top:15px; color:#2481cc; font-size:13px;">အကောင့်အသစ်ဖွင့်ရန်</div>
        </div>
      </div>

      <!-- 2. CHATS TAB -->
      <div id="chats-screen" class="screen">
        <header class="app-header"><h1>ShweChat</h1></header>
        <div class="main-screen-content" id="chats-list"></div>
      </div>

      <!-- 3. FRIENDS TAB -->
      <div id="friends-screen" class="screen">
        <header class="app-header"><h1>သူငယ်ချင်းများ</h1></header>
        <div class="main-screen-content" id="friends-list"></div>
        <div style="position:absolute; bottom:20px; right:20px; width:56px; height:56px; background:#2481cc; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-size:24px; box-shadow:0 4px 10px rgba(0,0,0,0.3);" onclick="openAddFriendModal()">+</div>
      </div>

      <!-- 4. PROFILE TAB -->
      <div id="profile-screen" class="screen">
        <header class="app-header"><h1>အကောင့်</h1></header>
        <div class="main-screen-content" style="padding:20px; text-align:center;">
          <div id="p-avatar" class="avatar" style="width:80px; height:80px; font-size:30px; margin:0 auto 20px;">U</div>
          <h3 id="p-name">-</h3>
          <p id="p-email" style="color:gray; margin-bottom:20px;">-</p>
          <button onclick="handleLogout()" style="width:100%; padding:12px; background:#f44336; color:white; border:none; border-radius:10px; font-weight:bold;">အကောင့်ထွက်ရန်</button>
        </div>
      </div>

      <!-- 5. CHAT ROOM SCREEN -->
      <div id="chat-room-screen" class="screen">
        <header class="app-header" style="padding:10px 16px;">
          <button onclick="exitChatRoom()" style="background:none; border:none; color:white; font-size:20px;"><i class="fa-solid fa-arrow-left"></i></button>
          <div style="flex:1; margin-left:15px;">
            <div id="chat-active-name" style="font-weight:bold;">-</div>
            <div style="font-size:11px; opacity:0.8;">အွန်လိုင်း</div>
          </div>
          <div style="display:flex; gap:15px;">
            <i class="fa-solid fa-phone" onclick="initiateBridgeCall('voice')"></i>
            <i class="fa-solid fa-video" onclick="initiateBridgeCall('video')"></i>
          </div>
        </header>
        <div class="chat-messages-area" id="chat-messages-container"></div>
        <div class="chat-input-bar">
          <input type="text" id="chat-message-input" class="chat-input" placeholder="စာတိုရေးရန်...">
          <button class="auth-btn" style="width:45px; height:40px; margin:0;" onclick="sendActiveMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
      </div>

    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="main-nav-bar" style="display:none;">
      <div class="nav-item active" onclick="switchNavTab('chats')" id="nav-chats">
        <i class="fa-solid fa-message"></i><span>မက်ဆေ့ခ်ျ</span>
      </div>
      <div class="nav-item" onclick="switchNavTab('friends')" id="nav-friends">
        <i class="fa-solid fa-users"></i><span>သူငယ်ချင်း</span>
      </div>
      <div class="nav-item" onclick="switchNavTab('profile')" id="nav-profile">
        <i class="fa-solid fa-user"></i><span>ကျွန်ုပ်</span>
      </div>
    </nav>

    <!-- Modal -->
    <div class="modal-overlay" id="global-modal">
      <div class="auth-card">
        <h3 id="modal-title" style="margin-bottom:15px;">ရှာဖွေမည်</h3>
        <input type="text" id="modal-input" placeholder="ဂျီမေးလ်ထည့်ပါ" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:15px;">
        <div style="display:flex; justify-content:flex-end; gap:10px;">
          <button onclick="closeGlobalModal()" style="background:none; border:none; color:gray;">ပိတ်မည်</button>
          <button id="modal-confirm-btn" style="padding:8px 15px; background:#2481cc; color:white; border:none; border-radius:5px;">အတည်ပြု</button>
        </div>
      </div>
    </div>

    <div id="toast-notif" class="toast"></div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD355MSuzGQ70An7M7rdG8APTqk-xtgFoM",
      authDomain: "shwechatmm.firebaseapp.com",
      projectId: "shwechatmm",
      storageBucket: "shwechatmm.firebasestorage.app",
      messagingSenderId: "904518107602",
      appId: "1:904518107602:android:89231af7657c3ded44880b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let me = null;
    let activeChatTarget = null;
    let authMode = "login";
    let currentTab = "chats";

    // Toast System
    function showToast(msg) {
      const t = document.getElementById("toast-notif");
      t.innerText = msg; t.style.display = "block";
      setTimeout(() => t.style.display = "none", 3000);
    }

    // Android Bridge Call
    function initiateBridgeCall(type) {
      if (window.Android && activeChatTarget) {
        window.Android.startCall(activeChatTarget.uid, type, activeChatTarget.name);
      } else {
        showToast("Native App လိုအပ်ပါသည်");
      }
    }

    function triggerNativeNoti(token, name, msg) {
      if (window.Android && token) {
        window.Android.sendNoti(token, name, msg);
      }
    }

    window.updateFCMToken = function(token) {
        if(auth.currentUser) {
            db.collection("Users").doc(auth.currentUser.uid).update({ fcmToken: token });
        }
    };

    // Navigation
    function switchNavTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
      document.getElementById("nav-" + tab).classList.add("active");
      showScreen(tab + "-screen");
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    // Auth Logic
    document.getElementById("auth-toggle-btn").onclick = () => {
      authMode = (authMode === "login") ? "register" : "login";
      document.getElementById("auth-name").style.display = (authMode === "register") ? "block" : "none";
      document.getElementById("auth-submit-btn").innerText = (authMode === "login") ? "အကောင့်ဝင်ရန်" : "အကောင့်ဖွင့်မည်";
      document.getElementById("auth-toggle-btn").innerText = (authMode === "login") ? "အကောင့်အသစ်ဖွင့်ရန်" : "အကောင့်ဝင်ရန်";
    };

    document.getElementById("auth-submit-btn").onclick = () => {
      const email = document.getElementById("auth-email").value;
      const pass = document.getElementById("auth-password").value;
      const name = document.getElementById("auth-name").value;

      if(authMode === "register") {
        auth.createUserWithEmailAndPassword(email, pass).then(res => {
          db.collection("Users").doc(res.user.uid).set({ uid: res.user.uid, name, email, fcmToken: "" });
        }).catch(e => showToast(e.message));
      } else {
        auth.signInWithEmailAndPassword(email, pass).catch(e => showToast(e.message));
      }
    };

    auth.onAuthStateChanged(user => {
      if(user) {
        me = user;
        document.getElementById("main-nav-bar").style.display = "flex";
        switchNavTab("chats");
        loadMe();
        startListeners();
      } else {
        showScreen("auth-screen");
        document.getElementById("main-nav-bar").style.display = "none";
      }
    });

    async function loadMe() {
      const doc = await db.collection("Users").doc(auth.currentUser.uid).get();
      const d = doc.data();
      document.getElementById("p-name").innerText = d.name;
      document.getElementById("p-email").innerText = d.email;
      document.getElementById("p-avatar").innerText = d.name[0].toUpperCase();
    }

    function handleLogout() { auth.signOut(); }

    // Realtime Listeners
    function startListeners() {
      // Recent Chats
      db.collection("Users").doc(auth.currentUser.uid).collection("RecentChats").orderBy("timestamp", "desc").onSnapshot(snap => {
        const list = document.getElementById("chats-list");
        list.innerHTML = "";
        snap.forEach(doc => {
          const d = doc.data();
          const item = document.createElement("div");
          item.className = "list-item";
          item.onclick = () => openChatRoom(d.uid, d.name, d.fcmToken);
          item.innerHTML = `<div class="avatar">${d.name[0]}</div><div><b>${d.name}</b><br><small>${d.lastMessage}</small></div>`;
          list.appendChild(item);
        });
      });

      // Friends
      db.collection("Users").doc(auth.currentUser.uid).collection("Friends").onSnapshot(snap => {
        const list = document.getElementById("friends-list");
        list.innerHTML = "";
        snap.forEach(doc => {
          const d = doc.data();
          const item = document.createElement("div");
          item.className = "list-item";
          item.onclick = () => openChatRoom(d.uid, d.name, d.fcmToken);
          item.innerHTML = `<div class="avatar">${d.name[0]}</div><div><b>${d.name}</b><br><small>စကားပြောရန် နှိပ်ပါ</small></div>`;
          list.appendChild(item);
        });
      });
    }

    // Chat Room
    function openChatRoom(uid, name, fcmToken) {
      activeChatTarget = { uid, name, fcmToken };
      document.getElementById("chat-active-name").innerText = name;
      showScreen("chat-room-screen");
      const roomId = getRoomId(auth.currentUser.uid, uid);
      
      db.collection("Chats").doc(roomId).collection("Messages").orderBy("timestamp", "asc").onSnapshot(snap => {
        const container = document.getElementById("chat-messages-container");
        container.innerHTML = "";
        snap.forEach(doc => {
          const m = doc.data();
          const div = document.createElement("div");
          div.className = "message-bubble " + (m.senderId === auth.currentUser.uid ? "sent" : "received");
          div.innerText = m.content;
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
      });
    }

    function exitChatRoom() { switchNavTab(currentTab); activeChatTarget = null; }

    async function sendActiveMessage() {
      const inp = document.getElementById("chat-message-input");
      const text = inp.value.trim();
      if(!text || !activeChatTarget) return;
      const target = activeChatTarget;
      inp.value = "";
      
      const roomId = getRoomId(auth.currentUser.uid, target.uid);
      const msg = { senderId: auth.currentUser.uid, content: text, timestamp: firebase.firestore.FieldValue.serverTimestamp() };
      
      await db.collection("Chats").doc(roomId).collection("Messages").add(msg);
      
      // Update Recent for both
      const myData = (await db.collection("Users").doc(auth.currentUser.uid).get()).data();
      db.collection("Users").doc(auth.currentUser.uid).collection("RecentChats").doc(target.uid).set({ uid: target.uid, name: target.name, lastMessage: text, timestamp: msg.timestamp, fcmToken: target.fcmToken }, {merge:true});
      db.collection("Users").doc(target.uid).collection("RecentChats").doc(auth.currentUser.uid).set({ uid: auth.currentUser.uid, name: myData.name, lastMessage: text, timestamp: msg.timestamp, fcmToken: myData.fcmToken }, {merge:true});
      
      triggerNativeNoti(target.fcmToken, myData.name, text);
    }

    function getRoomId(u1, u2) { return u1 < u2 ? u1+"_"+u2 : u2+"_"+u1; }

    // Friend Modal
    function openAddFriendModal() {
      document.getElementById("global-modal").classList.add("active");
      document.getElementById("modal-confirm-btn").onclick = async () => {
        const email = document.getElementById("modal-input").value.trim().toLowerCase();
        const snap = await db.collection("Users").where("email", "==", email).get();
        if(snap.empty) return showToast("ရှာမတွေ့ပါ");
        const friend = snap.docs[0].data();
        const meData = (await db.collection("Users").doc(auth.currentUser.uid).get()).data();
        
        await db.collection("Users").doc(auth.currentUser.uid).collection("Friends").doc(friend.uid).set(friend);
        await db.collection("Users").doc(friend.uid).collection("Friends").doc(auth.currentUser.uid).set(meData);
        showToast("သူငယ်ချင်းအဖြစ် ထည့်သွင်းပြီး");
        closeGlobalModal();
      };
    }
    function closeGlobalModal() { document.getElementById("global-modal").classList.remove("active"); }

  </script>
</body>
</html>
